<!doctype html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Easycheck — 랜딩 페이지</title>

        <meta
            name="ext-resource-dependency"
            content="images/easycheck-logo.webp"
            data-resource-id="logo"
        />
        <meta
            name="ext-resource-dependency"
            content="images/persona-outdoor.webp"
            data-resource-id="personaOutdoor"
        />
        <meta
            name="ext-resource-dependency"
            content="images/persona-elderly.webp"
            data-resource-id="personaElderly"
        />
        <meta
            name="ext-resource-dependency"
            content="images/persona-office.webp"
            data-resource-id="personaOffice"
        />
        <meta
            name="ext-resource-dependency"
            content="video/hero-video.mp4"
            data-resource-id="heroVideo"
        />

        <template id="__bundler_thumbnail" data-bg-color="#0068B7">
            <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
                <rect width="1200" height="800" fill="#0068B7" />
                <g fill="#ffffff" transform="translate(600 400)">
                    <circle cx="0" cy="-60" r="70" />
                    <path d="M -90 -30 Q 0 220 90 -30 Z" />
                </g>
                <text
                    x="600"
                    y="640"
                    text-anchor="middle"
                    font-family="sans-serif"
                    font-size="64"
                    font-weight="700"
                    fill="#ffffff"
                    letter-spacing="4"
                >
                    EASYCHECK
                </text>
            </svg>
        </template>

        <link rel="preconnect" href="https://cdn.jsdelivr.net" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
        />

        <script src="https://cdn.jsdelivr.net/npm/tailwindcss-cdn@3.4.10/tailwindcss.js"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            brand: {
                                primary: '#0068B7',
                                'primary-hover': '#00579C',
                                'primary-soft': '#E6F0F9',
                                accent: '#F39800',
                                'accent-hover': '#DC8800',
                                deep: '#003685',
                                sky: '#00AEEB',
                            },
                            bg: {
                                base: '#FFFFFF',
                                subtle: '#F5F8FB',
                                muted: '#EEF2F6',
                            },
                            border: {
                                DEFAULT: '#E5E9EF',
                                strong: '#CBD2DB',
                            },
                            text: {
                                primary: '#1F2937',
                                secondary: '#4B5563',
                                tertiary: '#6B7280',
                                disabled: '#9CA3AF',
                            },
                            success: '#16A34A',
                        },
                        fontFamily: {
                            sans: [
                                '"Pretendard Variable"',
                                'Pretendard',
                                '-apple-system',
                                'BlinkMacSystemFont',
                                'sans-serif',
                            ],
                        },
                        borderRadius: {
                            sm: '6px',
                            md: '8px',
                            lg: '12px',
                            xl: '16px',
                            '2xl': '24px',
                        },
                        boxShadow: {
                            sm: '0 1px 2px rgba(15,23,42,0.04)',
                            md: '0 4px 12px rgba(15,23,42,0.06)',
                            lg: '0 12px 32px rgba(15,23,42,0.08)',
                            ring: '0 0 0 3px rgba(0,104,183,0.25)',
                        },
                        backgroundImage: {
                            'hero-bg': 'linear-gradient(135deg, #FFFFFF 0%, #F5F8FB 100%)',
                            'accent-strip': 'linear-gradient(90deg, #003685 0%, #00AEEB 100%)',
                        },
                        maxWidth: {
                            '7xl': '1280px',
                            '8xl': '1920px',
                        },
                    },
                },
            };
        </script>

        <style>
            html,
            body {
                font-family:
                    'Pretendard Variable',
                    'Pretendard',
                    -apple-system,
                    sans-serif;
                letter-spacing: -0.02em;
                color: #1f2937;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
            /* Tokens used directly outside Tailwind */
            :root {
                --brand-primary: #0068b7;
                --brand-accent: #f39800;
                --brand-primary-soft: #e6f0f9;
                --bg-subtle: #f5f8fb;
                --bg-muted: #eef2f6;
                --border-default: #e5e9ef;
                --text-secondary: #4b5563;
                --text-tertiary: #6b7280;
                --success: #16a34a;
            }

            /* sr-only */
            .sr-only {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: 0;
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
                border: 0;
            }

            /* ─── Entry animation primitives ─── */
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(24px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .anim-up {
                opacity: 0;
                animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            }

            /* ─── Section paddings (20 / 64 / 120) ─── */
            .container-x {
                padding-left: 20px;
                padding-right: 20px;
            }
            @media (min-width: 768px) {
                .container-x {
                    padding-left: 64px;
                    padding-right: 64px;
                }
            }
            @media (min-width: 1024px) {
                .container-x {
                    padding-left: 120px;
                    padding-right: 120px;
                }
            }

            /* ─── Focus ring helper ─── */
            .focus-ring:focus-visible {
                outline: none;
                box-shadow: 0 0 0 3px rgba(0, 104, 183, 0.25);
            }

            /* ─── Nav blur ─── */
            .nav-blur {
                background: rgba(255, 255, 255, 0.85);
                -webkit-backdrop-filter: saturate(180%) blur(10px);
                backdrop-filter: saturate(180%) blur(10px);
            }

            /* ─── Striped placeholder ─── */
            .ph-stripes {
                background-image:
                    repeating-linear-gradient(
                        45deg,
                        rgba(15, 23, 42, 0.04) 0 1px,
                        transparent 1px 10px
                    ),
                    #eef2f6;
            }

            /* ─── Hero 하단 신뢰 정보 띠지 (정적) ─── */
            .trust-band {
                background: #f5f8fb;
                border-top: 1px solid #e5e9ef;
                border-bottom: 1px solid #e5e9ef;
            }

            /* ─── Hero 배경 영상 ─── */
            .hero-video-section {
                background: #0a1628;
                min-height: clamp(560px, 88vh, 900px);
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .hero-video {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                z-index: 0;
            }
            .hero-video-overlay {
                position: absolute;
                inset: 0;
                z-index: 1;
                background:
                    linear-gradient(
                        90deg,
                        rgba(3, 16, 38, 0.86) 0%,
                        rgba(3, 16, 38, 0.66) 42%,
                        rgba(3, 16, 38, 0.32) 78%,
                        rgba(3, 16, 38, 0.22) 100%
                    ),
                    linear-gradient(
                        180deg,
                        rgba(3, 16, 38, 0.25) 0%,
                        rgba(3, 16, 38, 0) 30%,
                        rgba(3, 16, 38, 0) 65%,
                        rgba(3, 16, 38, 0.4) 100%
                    ),
                    radial-gradient(
                        130% 120% at 35% 45%,
                        rgba(0, 0, 0, 0) 55%,
                        rgba(0, 0, 0, 0.35) 100%
                    );
            }
            .hero-headline {
                text-shadow:
                    0 2px 28px rgba(0, 16, 40, 0.5),
                    0 1px 3px rgba(0, 0, 0, 0.35);
            }
            .cta-primary-btn:hover {
                background: #f5f8fb;
                transform: translateY(-2px);
                box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
            }

            /* ─── prefers-reduced-motion ─── */
            @media (prefers-reduced-motion: reduce) {
                .anim-up {
                    animation: none !important;
                    opacity: 1 !important;
                    transform: none !important;
                }
            }

            /* ─── Standalone-build fallback: critical Tailwind utilities
                  (Play CDN JIT may miss classes only used in React-rendered DOM) ─── */
            .bg-white {
                background-color: #ffffff;
            }
            .text-white {
                color: #ffffff;
            }
            .bg-white\/10 {
                background-color: rgba(255, 255, 255, 0.1);
            }
            .bg-white\/15 {
                background-color: rgba(255, 255, 255, 0.15);
            }
            .bg-white\/20 {
                background-color: rgba(255, 255, 255, 0.2);
            }
            .border-white\/10 {
                border-color: rgba(255, 255, 255, 0.1);
            }
            .border-white\/15 {
                border-color: rgba(255, 255, 255, 0.15);
            }
            .border-white\/20 {
                border-color: rgba(255, 255, 255, 0.2);
            }
        </style>
    </head>
    <body class="bg-white text-text-primary">
        <script
            src="https://unpkg.com/react@18.3.1/umd/react.development.js"
            integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
            integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
            integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
            crossorigin="anonymous"
        ></script>

        <div id="root"></div>

        <script type="text/babel" src="icons.jsx"></script>
        <script type="text/babel" src="hero.jsx"></script>
        <script type="text/babel" src="stats.jsx"></script>
        <script type="text/babel" src="problem.jsx"></script>
        <script type="text/babel" src="solution.jsx"></script>
        <script type="text/babel" src="tech.jsx"></script>
        <script type="text/babel" src="footer.jsx"></script>
        <style>
            /* ─── Section anchor offset (sticky nav) + smooth scroll ─── */
            html {
                scroll-behavior: smooth;
            }
            #stats,
            #problem,
            #solution,
            #tech {
                scroll-margin-top: 88px;
            }
        </style>
        <style>
            /* ─── Stats chart animations ─── */
            @keyframes drawLine {
                to {
                    stroke-dashoffset: 0;
                }
            }
            @keyframes popIn {
                0% {
                    opacity: 0;
                    transform: scale(0.4);
                }
                60% {
                    transform: scale(1.15);
                }
                100% {
                    opacity: 1;
                    transform: scale(1);
                }
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes peakPulse {
                0%,
                100% {
                    transform: scale(1);
                    opacity: 0.6;
                }
                50% {
                    transform: scale(1.6);
                    opacity: 0;
                }
            }
            .chart-line {
                stroke-dasharray: 1;
                stroke-dashoffset: 1;
            }
            .chart-visible .chart-line {
                animation: drawLine 0.8s cubic-bezier(0.65, 0, 0.35, 1) 0.1s forwards;
            }
            .chart-area {
                opacity: 0;
            }
            .chart-visible .chart-area {
                animation: fadeIn 0.6s ease-out 0.3s forwards;
            }
            .chart-dot {
                opacity: 0;
                transform-box: fill-box;
                transform-origin: center;
            }
            .chart-visible .chart-dot {
                animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            }
            .chart-peak-ring {
                transform-box: fill-box;
                transform-origin: center;
                animation: peakPulse 2.2s ease-out 2.4s infinite;
            }
            .chart-peak-label {
                opacity: 0;
                animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 2s forwards;
            }
            .chart-axis-label {
                opacity: 0;
            }
            .chart-visible .chart-axis-label {
                animation: fadeIn 0.6s ease-out forwards;
            }
            .chart-zoom-box {
                opacity: 0;
                animation: fadeIn 0.6s ease-out 2.3s forwards;
            }
            .chart-inset {
                opacity: 0;
                transform-box: fill-box;
                transform-origin: center;
                animation: popIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 2.5s forwards;
            }
            .chart-bubble {
                opacity: 0;
                animation: fadeIn 0.9s ease-out 2.2s forwards;
            }
            @media (prefers-reduced-motion: reduce) {
                .chart-line,
                .chart-area,
                .chart-dot,
                .chart-peak-ring,
                .chart-peak-label,
                .chart-axis-label,
                .chart-zoom-box,
                .chart-inset,
                .chart-bubble {
                    animation: none !important;
                    opacity: 1 !important;
                    stroke-dashoffset: 0 !important;
                }
            }
        </style>

        <script type="text/babel">
            function App() {
                return (
                    <div className="min-h-screen bg-white">
                        <Nav />
                        {/* 1. Hero */}
                        <Hero />
                        {/* 2. 통계 — 연도별 여름 평균기온 */}
                        <StatsSection />
                        {/* 3. 왜 지금인가 */}
                        <ProblemSection />
                        {/* 4. 솔루션 */}
                        <SolutionSection />
                        {/* 5. 핵심기술 */}
                        <TechSection />
                        <Footer />
                    </div>
                );
            }
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        </script>
    </body>
</html>
